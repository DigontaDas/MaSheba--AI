name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Lint
        working-directory: backend
        run: python -m ruff check .
      - name: Test
        working-directory: backend
        run: python -m pytest
      - name: Dependency audit
        working-directory: backend
        run: python -m pip_audit -r requirements.txt

  model:
    name: Model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: model
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        working-directory: model
        run: python -m ruff check .
      - name: Test
        working-directory: model
        run: python -m pytest
      - name: Dependency audit
        working-directory: model
        run: python -m pip_audit --skip-editable

  admin:
    name: Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - name: Install dependencies
        working-directory: admin
        run: npm ci
      - name: Lint
        working-directory: admin
        run: npm run lint
      - name: Typecheck
        working-directory: admin
        run: npm run typecheck
      - name: Build
        working-directory: admin
        run: npm run build
      - name: Dependency audit
        working-directory: admin
        run: npm audit --audit-level=high

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        working-directory: mobile
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npm run lint
      - name: Jest
        working-directory: mobile
        run: npm test -- --watch=false
      - name: Dependency audit
        working-directory: mobile
        run: npm audit --audit-level=high

  android:
    name: Android
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        working-directory: mobile
        run: npm ci
      - name: Android tests
        working-directory: mobile/android
        run: .\gradlew.bat test

  live-supabase-smoke:
    name: Live Supabase Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Validate live Supabase secrets
        env:
          CI_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          CI_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          CI_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PY'
          import os
          import sys

          required = ("CI_SUPABASE_URL", "CI_SUPABASE_ANON_KEY", "CI_SUPABASE_SERVICE_ROLE_KEY")
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              print(f"Missing required live Supabase secrets: {', '.join(missing)}")
              sys.exit(1)
          PY
      - name: Run live Supabase smoke tests
        working-directory: backend
        env:
          MAASHEBA_RUN_LIVE_SUPABASE: "1"
          CI_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          CI_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          CI_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m pytest -m live_supabase
